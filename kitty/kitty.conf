# --- Fonts ---
font_family      family="JetBrainsMono Nerd Font"
font_size        14.0

# --- Colors (Catppuccin Mocha Base + MADS Yellow Accent) ---
background       #1e1e2e
foreground       #cdd6f4
cursor           #F5C842
selection_bg     #7A651A
selection_fg     #cdd6f4

# --- Terminal ANSI Colors (Catppuccin Mocha Palette) ---
# Black
color0 #45475a
color8 #585b70
# Red
color1 #f38ba8
color9 #f38ba8
# Green
color2  #a6e3a1
color10 #a6e3a1
# Yellow
color3  #f9e2af
color11 #f9e2af
# Blue
color4  #89b4fa
color12 #89b4fa
# Magenta
color5  #f5c2e7
color13 #f5c2e7
# Cyan
color6  #94e2d5
color14 #94e2d5
# White
color7  #bac2de
color15 #a6adc8

# --- Window Layout ---
window_padding_width 12

# --- macOS Customization ---
hide_window_decorations yes
macos_titlebar_color background
macos_option_as_alt yes

# --- Performance & Core ---
repaint_delay    8
input_delay      3
sync_to_monitor  yes

# --- Resize splits directly ---
map alt+left  resize_window narrower 2
map alt+right resize_window wider 2
map alt+up    resize_window taller 2
map alt+down  resize_window shorter 2

# Reset windows back to equal size
map alt+=     resize_window reset
