# --- Fonts ---
font_family      family="JetBrainsMono Nerd Font"
font_size        14.0

# --- Colors (Catppuccin Mocha Base + MADS Yellow Accent) ---
background       #1e1e2e
foreground       #cdd6f4
cursor           #F5C842
selection_bg     #7A651A
selection_fg     #cdd6f4

# --- Terminal ANSI Colors (Catppuccin Mocha Palette) ---
# Black
color0 #45475a
color8 #585b70
# Red
color1 #f38ba8
color9 #f38ba8
# Green
color2  #a6e3a1
color10 #a6e3a1
# Yellow
color3  #f9e2af
color11 #f9e2af
# Blue
color4  #89b4fa
color12 #89b4fa
# Magenta
color5  #f5c2e7
color13 #f5c2e7
# Cyan
color6  #94e2d5
color14 #94e2d5
# White
color7  #bac2de
color15 #a6adc8

# --- Window Layout ---
window_padding_width 12

# --- Modern Tab Bar Settings ---
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{index}: {title}"

# --- Tab Bar Colors (Matching Mocha + MADS Yellow) ---
active_tab_foreground   #1e1e2e
active_tab_background   #F5C842
active_tab_font_style   bold
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244
inactive_tab_font_style normal

# --- macOS Customization ---
hide_window_decorations yes
macos_titlebar_color background
macos_option_as_alt yes

# --- Performance & Core ---
repaint_delay    8
input_delay      3
sync_to_monitor  yes

# --- Resize splits directly ---
map alt+left  resize_window narrower 2
map alt+right resize_window wider 2
map alt+up    resize_window taller 2
map alt+down  resize_window shorter 2

# Reset windows back to equal size
map alt+=     resize_window reset

# --- Tab Management Keybindings ---
# Open new tabs in the current working directory
map cmd+t       new_tab_with_cwd
map cmd+w       close_tab
map cmd+1       goto_tab 1
map cmd+2       goto_tab 2
map cmd+3       goto_tab 3
map cmd+4       goto_tab 4
map cmd+5       goto_tab 5
map cmd+right   next_tab
map cmd+left    previous_tab
